# Aesthetic score verifier
#
# Uses CLIP ViT-L/14 + MLP to predict aesthetic quality.
# The MLP weights are automatically downloaded from the internet
# if checkpoint_path is not specified.
#
# To use a local file instead:
#   checkpoint_path: "/path/to/sac+logos+ava1-l14-linearMSE.pth"

verifier:
  name: aesthetic
  batch_size: 32
  # checkpoint_path auto-downloads from internet if omitted
