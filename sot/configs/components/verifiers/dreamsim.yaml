# DreamSim verifier for image-to-image perceptual similarity
# Uses the DreamSim model to compare generated images against reference images.
# Requires: pip install -e ".[dreamsim]"
#
# Note: DreamSim requires reference images (passed via dataset metadata).
# Use with DreamBench++ or similar subject-driven benchmarks.

verifier:
  name: dreamsim
  batch_size: 32

