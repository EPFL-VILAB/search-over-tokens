# FlexTok AR model for Text-to-Image generation
# Requires flextok-ar package and model checkpoint

ar_prior:
  name: flextok_ar_3b
  model_id: ZhitongGao/FlexAR-3B-T2I
  model_type: ar_text_to_image_model
  
  # --- AR model generation params (passed to generate_ids) ---
  # Base AR params (sample, temperature, cfg_factor, top_k, top_p, num_keep_tokens)
  # are read from the model config (config_path → cfg.generation) automatically.
  # Only search-specific overrides need to be listed here:
  generation_kwargs:
    replacement: false         # Sample without replacement (old code: explicit False)
    return_probs: true         # Return token log-probs for scoring

  # --- FlexTok decoder params (passed to FlexTok decode / flow matching pipeline) ---
  # These are the single source of truth for decoding. Search algorithms do not
  # override them — change here to affect all searches using this model.
  decode_kwargs:
    timesteps: 20              # Flow matching denoising steps
    guidance_scale: 7.5        # FlexTok decoder CFG scale
    perform_norm_guidance: true # APG (norm guidance) for decoder
    use_same_noise_per_prompt: true   # Use same noise for all candidates under a same caption
