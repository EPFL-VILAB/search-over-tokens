# @package _global_

# GenEval Best-of-50 with Ensemble Verifier (rank-based)
#
# Generates 50 complete sequences per prompt and selects the best
# according to an ensemble of 6 reward models.
#
# Usage:
#   Single GPU:  python scripts/run_search.py --config-name eval/geneval_flextok_bon50_ensemble
#   Multi-GPU:   torchrun --nproc-per-node=4 scripts/run_search.py --config-name eval/geneval_flextok_bon50_ensemble

defaults:
  - /eval/base
  - /components/ar_priors/flextok/flextok_ar_3b
  - /components/search_algorithms/best_of_n
  - /components/verifiers/ensemble

# Best-of-N override
search:
  name: best_of_n
  n_samples: 50

# Dataset configuration
dataset:
  name: geneval
  dataset_dir: datasets/geneval
