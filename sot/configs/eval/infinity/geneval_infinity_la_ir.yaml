# @package _global_

# GenEval Infinity Lookahead Beam Search with ImageReward Verifier
#
# Lookahead extends partial sequences to the end (greedy) for better
# intermediate images at early scales (steps 0-7).  Beyond step 8,
# falls back to plain beam search (no extension needed since images
# are already high quality at later scales).
#
# Usage:
#   python scripts/run_search.py --config-name eval/geneval_infinity_la_ir

defaults:
  - /eval/base
  - /components/ar_priors/infinity/infinity
  - /components/search_algorithms/lookahead_search
  - /components/verifiers/image_reward

# Search overrides for Infinity lookahead
search:
  name: lookahead
  beam_width: 5
  max_steps: 13
  candidates_per_beam: 10
  token_schedule: scale
  lookahead_number: -1            # Extend to end (all remaining scales)
  max_lookahead_step: 8           # Lookahead only for steps 0-7, pure beam for 8+

# Dataset configuration
dataset:
  name: geneval
  dataset_dir: datasets/geneval

# Runtime settings
