# @package _global_

# GenEval Infinity Beam Search with ImageReward Verifier
#
# Multi-scale beam search over Infinity's coarse-to-fine token space.
# Uses one search step per scale (token_schedule: scale), matching the
#
# Usage:
#   Single GPU:  python scripts/run_search.py --config-name eval/geneval_infinity_beam_ir
#   Multi-GPU:   torchrun --nproc-per-node=4 scripts/run_search.py --config-name eval/geneval_infinity_beam_ir

defaults:
  - /eval/base
  - /components/ar_priors/infinity/infinity
  - /components/search_algorithms/beam_search
  - /components/verifiers/image_reward

# Search overrides for Infinity (scale-based schedule, 1 scale per step)
search:
  name: beam
  beam_width: 5
  max_steps: 13
  candidates_per_beam: 10
  token_schedule: scale         # Each step = one Infinity scale

# Dataset configuration
dataset:
  name: geneval
  dataset_dir: datasets/geneval
