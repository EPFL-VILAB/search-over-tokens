# @package _global_

# GenEval Beam Search with GridTok (2D) + ImageReward Verifier

defaults:
  - /eval/base
  - /components/ar_priors/gridtok/gridtok_ar_3b
  - /components/search_algorithms/beam_search
  - /components/verifiers/image_reward

search:
  name: beam
  beam_width: 5
  max_steps: 9
  candidates_per_beam: 10
  token_schedule: linear
  tokens_per_step: 32

dataset:
  name: geneval
  dataset_dir: datasets/geneval
