# @package _global_

# GenEval Beam Search with Infinity + Ensemble Verifier
#
# Usage:
#   Single GPU:  python scripts/run_search.py --config-name eval/geneval_infinity_beam_ensemble
#   Multi-GPU:   torchrun --nproc-per-node=4 scripts/run_search.py --config-name eval/geneval_infinity_beam_ensemble

defaults:
  - /eval/base
  - /components/ar_priors/infinity/infinity
  - /components/search_algorithms/beam_search
  - /components/verifiers/ensemble

search:
  name: beam

dataset:
  name: geneval
  dataset_dir: datasets/geneval
