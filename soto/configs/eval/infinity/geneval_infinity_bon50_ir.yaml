# @package _global_

# GenEval Infinity Best-of-50 with ImageReward Verifier
#
# Generates 50 complete multi-scale sequences from Infinity,
# scores with ImageReward, and returns the best.
#
# Usage:
#   python scripts/run_search.py --config-name eval/geneval_infinity_bon50_ir

defaults:
  - /eval/base
  - /components/ar_priors/infinity/infinity
  - /components/search_algorithms/best_of_n
  - /components/verifiers/image_reward

# Best-of-N override
search:
  name: best_of_n
  n_samples: 50

# Dataset configuration
dataset:
  name: geneval
  dataset_dir: datasets/geneval
