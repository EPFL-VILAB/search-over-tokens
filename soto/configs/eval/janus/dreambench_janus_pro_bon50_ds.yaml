# @package _global_

# DreamBench++ Janus Pro Best-of-50 with DreamSim Verifier
#
# Subject-driven generation: generates 50 complete sequences per prompt,
# scores with DreamSim, and returns the best.
#
#
# Usage:
#   python scripts/run_search.py --config-name eval/dreambench_janus_pro_bon50_ds

defaults:
  - /eval/base
  - /components/ar_priors/janus/janus_pro
  - /components/search_algorithms/best_of_n
  - /components/verifiers/dreamsim

# Best-of-N override
search:
  name: best_of_n
  n_samples: 50

# Dataset configuration
dataset:
  name: dreambench
  dataset_dir: datasets/dreambench
