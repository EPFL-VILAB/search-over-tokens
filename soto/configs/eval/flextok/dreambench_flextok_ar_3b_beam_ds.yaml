# @package _global_

# DreamBench++ FlexTok Beam Search with DreamSim Verifier
#
# Subject-driven generation scored by DreamSim perceptual similarity.
#
#
# Usage:
#   python scripts/run_search.py --config-name eval/dreambench_flextok_beam_ds

defaults:
  - /eval/base
  - /components/ar_priors/flextok/flextok_ar_3b
  - /components/search_algorithms/beam_search
  - /components/verifiers/dreamsim

# Search overrides for FlexTok beam search
# 1 token per step, 32 steps → token count: 1, 2, 3, ..., 32
# AR completes the remaining tokens to full sequence length
search:
  name: beam
  beam_width: 5
  max_steps: 32
  candidates_per_beam: 10
  token_schedule: linear
  tokens_per_step: 1

# Dataset configuration
# Images are auto-downloaded from HuggingFace/Google Drive if not present.
# Set images_dir to override with a local path (optional).
dataset:
  name: dreambench
  dataset_dir: datasets/dreambench
