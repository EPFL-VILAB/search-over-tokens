# @package _global_

# GenEval Beam Search — Uniform Random Sampling + ImageReward
#
# Beam search using uniformly-sampled random tokens (no AR model).
# Each step samples 640 candidate tokens uniformly and keeps the top-5
# beams according to ImageReward.
#
#
# Usage:
#   Single GPU:  python scripts/run_search.py --config-name eval/geneval_flextok_beam_uniform_ir
#   Multi-GPU:   torchrun --nproc-per-node=4 scripts/run_search.py --config-name eval/geneval_flextok_beam_uniform_ir

defaults:
  - /eval/base
  - /components/ar_priors/uniform
  - /components/search_algorithms/beam_search
  - /components/verifiers/image_reward

search:
  name: beam
  beam_width: 5
  max_steps: 32
  candidates_per_beam: 640          # sample_ratio 0.01 × vocab 64000
  token_schedule: linear
  tokens_per_step: 1

# Dataset configuration
dataset:
  name: geneval
  dataset_dir: datasets/geneval
