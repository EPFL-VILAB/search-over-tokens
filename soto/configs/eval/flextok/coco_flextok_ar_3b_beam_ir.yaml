# @package _global_

# COCO Beam Search with FlexTok + ImageReward
#
# Usage:
#   Single GPU:  python scripts/run_search.py --config-name eval/coco_flextok_beam_ir
#   Multi-GPU:   torchrun --nproc-per-node=4 scripts/run_search.py --config-name eval/coco_flextok_beam_ir

defaults:
  - /eval/base
  - /components/ar_priors/flextok/flextok_ar_3b
  - /components/search_algorithms/beam_search
  - /components/verifiers/image_reward

search:
  name: beam

dataset:
  name: coco
  dataset_dir: datasets/coco
  num_samples: 300
