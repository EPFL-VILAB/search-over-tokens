# @package _global_

# GenEval Beam Search — Unconditional AR + ImageReward
#
# Beam search using the FlexTok AR model in UNCONDITIONAL mode:
# tokens are generated without text conditioning, then scored by
# ImageReward on the original prompt.
#
#
# Usage:
#   Single GPU:  python scripts/run_search.py --config-name eval/geneval_flextok_beam_uncond_ir
#   Multi-GPU:   torchrun --nproc-per-node=4 scripts/run_search.py --config-name eval/geneval_flextok_beam_uncond_ir

defaults:
  - /eval/base
  - /components/ar_priors/flextok/flextok_ar_3b_uncond
  - /components/search_algorithms/beam_search
  - /components/verifiers/image_reward

search:
  name: beam
  beam_width: 5
  max_steps: 32
  candidates_per_beam: 640          # sample_ratio 0.01 × vocab 64000
  token_schedule: linear
  tokens_per_step: 1

# Dataset configuration
dataset:
  name: geneval
  dataset_dir: datasets/geneval
