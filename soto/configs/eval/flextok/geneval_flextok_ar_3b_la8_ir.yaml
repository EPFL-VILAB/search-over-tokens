# @package _global_

# GenEval Lookahead Beam Search (LA=8) with ImageReward Verifier
#
# Beam search with 8-token lookahead AR completion for better
#
# Usage:
#   Single GPU:  python scripts/run_search.py --config-name eval/geneval_flextok_la8_ir
#   Multi-GPU:   torchrun --nproc-per-node=4 scripts/run_search.py --config-name eval/geneval_flextok_la8_ir

defaults:
  - /eval/base
  - /components/ar_priors/flextok/flextok_ar_3b
  - /components/search_algorithms/lookahead_search
  - /components/verifiers/image_reward

# Search overrides
search:
  name: lookahead
  lookahead_number: 8             # 8-token lookahead (matching "la8")

# Dataset configuration
dataset:
  name: geneval
  dataset_dir: datasets/geneval
