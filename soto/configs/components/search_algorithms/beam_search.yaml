# Beam search algorithm
# Incrementally generates tokens while maintaining top-K candidates

search:
  name: beam
  beam_width: 5
  max_steps: 9
  sample: true                     # false = deterministic top-k branching; true = multinomial sampling
  candidates_per_beam: 10           # Number of candidates to sample per beam
  token_schedule: geometric          # Options: geometric, linear, fixed
  geometric_base: 2.0               # For geometric schedule
  tokens_per_step: -1               # For linear schedule
  decode_batch_size: 50             # Batch size for decoding to avoid OOM
  # decode_timesteps is controlled by ar_prior.decode_kwargs.timesteps

  # Infinity-specific options (leave commented out for other models):
  # scale_first_step: false         # Ramp candidates up in the first beam step
  # complete_after_search: false    # AR-complete remaining tokens before final decode
