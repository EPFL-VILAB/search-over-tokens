# Uniform prior (baseline)
# Samples tokens uniformly at random — no AR model.
#
# Mirrors search-dev config option:  sampling_mode: "random_uniform"

ar_prior:
  name: uniform
  vocab_size: 64000    # FSQ vocabulary size
  max_tokens: 256

  tokenizer_model: "EPFL-VILAB/flextok_d18_d28_dfn"

  # FlexTok decoder params (same as flextok.yaml for fair comparison)
  decode_kwargs:
    timesteps: 20
    guidance_scale: 7.5
    perform_norm_guidance: true
    use_same_noise_per_prompt: true
