# GridTok (2D) AR d36 model for Text-to-Image generation
# Uses 2D grid tokenizer (16x16 tokens) instead of 1D (256x1)
# Model: 36 blocks, embed_dim=2304

ar_prior:
  name: gridtok_ar_3b
  model_id: EPFL-VILAB/GridAR-3B-T2I
  model_type: ar_text_to_image_model
  
  # VAE image sizes override (2D grid needs explicit size)
  vae_image_sizes: 32
  
  generation_kwargs:
    replacement: false
    return_probs: true

  decode_kwargs:
    timesteps: 20
    guidance_scale: 5.0
    perform_norm_guidance: true
    use_same_noise_per_prompt: true

