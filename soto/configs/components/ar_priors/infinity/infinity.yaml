# Infinity multi-scale visual AR model for Text-to-Image generation
#
# Everything is auto-downloaded:
#   - Source code: cloned from GitHub (FoundationVision/Infinity) to ~/.cache/infinity/
#   - Checkpoints: downloaded from HuggingFace (FoundationVision/Infinity)
#   - T5 encoder: downloaded from HuggingFace (google/flan-t5-xl)
# Override any path with a local path if desired.

ar_prior:
  name: infinity

  # --- Model paths (set to "auto" to auto-download, or override with local paths) ---
  model_path: auto                # HF: infinity_2b_reg.pth
  vae_path: auto                  # HF: infinity_vae_d32reg.pth
  text_encoder_ckpt: auto         # HF: google/flan-t5-xl
  # cache_dir: ~/.cache/infinity  # optional: override cache location

  # --- Model architecture ---
  model_type: infinity_2b         # Options: infinity_2b, infinity_8b
  vae_type: 32                    # BSQ-VAE codebook dimension (bit-width)
  pn: "1M"                        # Pixel count (determines scale schedule)
  h_div_w_template: 1.0           # Aspect ratio (1.0 = square)

  # --- Generation parameters ---
  cfg_factor: 3.0                 # Classifier-free guidance scale
  temperature: 1.0                # Sampling temperature
  cfg_insertion_layer: [0]        # CFG insertion: [0] = on logits, [-N] = N-th layer from end

