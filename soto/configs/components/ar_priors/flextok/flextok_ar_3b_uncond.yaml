# FlexTok AR model — UNCONDITIONAL generation mode
#
# Same AR model as flextok.yaml but generates tokens WITHOUT text conditioning.
# The prompt is replaced with the text encoder's singleton value (unconditional
# token) and classifier-free guidance is disabled during AR generation.
# The verifier still sees the original text prompt for scoring.
#
# Mirrors search-dev config option:  use_uncond_gen: True

ar_prior:
  name: flextok_ar_3b
  model_id: EPFL-VILAB/FlexAR-3B-T2I

  # --- Unconditional generation ---
  use_uncond_gen: true

  # --- AR model generation params ---
  generation_kwargs:
    replacement: false
    return_probs: true

  # --- FlexTok decoder params ---
  decode_kwargs:
    timesteps: 20
    guidance_scale: 7.5
    perform_norm_guidance: true
    use_same_noise_per_prompt: true

